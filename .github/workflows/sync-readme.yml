name: Sync README from template

on:
  push:
    branches:
      - releases
      - develop
    # 避免由本工作流生成的提交再次触发
    paths:
      - 'README.template.md'
      - '.github/workflows/sync-readme.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  render-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许修改内容
      pull-requests: write  # 允许创建 PR
    # 防止无限循环
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip-ci]')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set warning text based on branch
        id: vars
        run: |
          REF_NAME="${{ github.ref_name }}"
          if [ "$REF_NAME" = "releases" ]; then
            WARNING="> 本分支为稳定发布版本。开发版本请见 [\`develop\`](https://github.com/EERNINUO/ArbWave30/tree/develop) 分支。"
          elif [ "$REF_NAME" = "develop" ]; then
            WARNING="> **⚠️ 注意**：你当前查看的是 **develop** 开发分支，内容可能不稳定。\n> 推荐使用稳定发布版本：[查看 Releases](https://github.com/EERNINUO/ArbWave30/releases)"
          else
            WARNING="> **ℹ️ 提示**：你正在查看一个非默认分支。"
          fi
          echo "warning=$WARNING" >> $GITHUB_OUTPUT

      - name: Render README.md
        run: |
          # 将模板文件中的 {{BRANCH_WARNING}} 替换为实际内容
          sed -e "s|{{BRANCH_WARNING}}|${{ steps.vars.outputs.warning }}|g" README.template.md > README.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: auto-render README from template [skip-ci]"
          title: "docs: auto-update README from template"
          body: "Auto-generated PR to update README.md from template"
          branch: "auto-update-readme-${{ github.ref_name }}"
          delete-branch: true